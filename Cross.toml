# `cross` per-target overrides used by the release workflow.
#
# Intentionally empty (apart from this comment).
#
# Previously this file pre-installed `libxcb-*-dev:<target>` inside
# the cross Docker image so `arboard` could find the headers at
# cross-compile time.  That turned out to be unnecessary — `arboard`
# uses `x11rb` for X11 and `wl-clipboard-rs` for Wayland, both
# pure-Rust protocol implementations that don't link against C
# libxcb.  And the install *broke* the riscv64 build: cross 0.2.5
# ships an Ubuntu 18.04 (bionic) base whose APT repos have no
# riscv64 ports, so `libxcb-*-dev:riscv64` is unresolvable.
#
# Keep this file around as the canonical place to pin per-target
# images or add real pre-build steps when a future crate needs
# them.
