name: CI

on:
  push:
    branches: [master]
  pull_request:

# Keep a single run per branch — cancel older runs when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Treat any warning as an error across cargo build / cargo test.
  RUSTFLAGS: -D warnings
  # Keep cargo logs compact in CI output.
  CARGO_INCREMENTAL: 0

jobs:
  # -----------------------------------------------------------------------
  # Formatting — fast, no build needed.
  # -----------------------------------------------------------------------
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # -----------------------------------------------------------------------
  # Clippy — lints with warnings-as-errors.
  # -----------------------------------------------------------------------
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies (arboard / X11)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # -----------------------------------------------------------------------
  # Tests — the full workspace test suite.
  # -----------------------------------------------------------------------
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (arboard / X11)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --workspace --locked
