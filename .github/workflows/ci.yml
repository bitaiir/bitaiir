name: CI

on:
  push:
    branches: [master]
  pull_request:

# Keep a single run per branch — cancel older runs when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Treat any warning as an error across cargo build / cargo test.
  RUSTFLAGS: -D warnings
  # Keep cargo logs compact in CI output.
  CARGO_INCREMENTAL: 0

jobs:
  # -----------------------------------------------------------------------
  # Formatting — runs on every OS so Windows-specific `#[cfg(windows)]`
  # blocks are also format-checked.
  # -----------------------------------------------------------------------
  fmt:
    name: rustfmt (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # -----------------------------------------------------------------------
  # Clippy — lints with warnings-as-errors, cross-platform.
  # Needed on Windows in particular so the `winapi` FFI module and any
  # `#[cfg(windows)]` code actually get linted.
  # -----------------------------------------------------------------------
  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies (arboard / X11)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # -----------------------------------------------------------------------
  # Tests — the full workspace test suite on every supported OS.  Hash
  # and chain code is deterministic by design, so any cross-platform
  # drift (crypto, merkle, signing, canonical encoding) shows up here.
  # -----------------------------------------------------------------------
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (arboard / X11)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --workspace --locked

  # -----------------------------------------------------------------------
  # Multi-node integration tests.
  #
  # Each scenario in `crates/bitaiir-daemon/tests/multinode.rs`
  # spawns 2–3 real `bitaiird` processes on unique ports and
  # drives them over JSON-RPC — full-stack (storage → chain →
  # net → RPC → wallet) end-to-end coverage.  Tests are marked
  # `#[ignore]` so the normal `test` job skips them (they would
  # otherwise time out in dev mode because Argon2id at 64 MiB is
  # ~20× slower unoptimized).  This job builds in release and
  # passes `-- --ignored --test-threads=1`.
  # -----------------------------------------------------------------------
  integration-multinode:
    name: integration (multinode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (arboard / X11)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          key: multinode

      - name: cargo test --release --test multinode -- --ignored
        run: cargo test --release --locked --test multinode -- --ignored --test-threads=1 --nocapture
        timeout-minutes: 30

  # -----------------------------------------------------------------------
  # RISC-V cross-compilation check.
  #
  # Validates that every crate in the workspace compiles for riscv64gc,
  # the 64-bit RISC-V target with general-purpose + compressed ISA
  # extensions.  This is a *build* check, not a test run — we can't
  # execute RISC-V binaries on an x86 runner.
  #
  # Why it matters: RISC-V is open-source hardware with no royalties.
  # Ensuring BitAiir builds on it means anyone with a $10–50 SBC can
  # run a full node and mine, which aligns with the "democratized
  # mining" goal of Proof of Aiir.
  # -----------------------------------------------------------------------
  build-riscv64:
    name: build (riscv64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + RISC-V target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv64gc-unknown-linux-gnu

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-riscv64-linux-gnu \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          key: riscv64

      - name: cargo build --target riscv64gc
        run: cargo build --workspace --target riscv64gc-unknown-linux-gnu --locked
        env:
          CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER: riscv64-linux-gnu-gcc
