name: CI

on:
  push:
    branches: [master]
  pull_request:

# Keep a single run per branch — cancel older runs when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Treat any warning as an error across cargo build / cargo test.
  RUSTFLAGS: -D warnings
  # Keep cargo logs compact in CI output.
  CARGO_INCREMENTAL: 0

jobs:
  # -----------------------------------------------------------------------
  # Formatting — runs on every OS so Windows-specific `#[cfg(windows)]`
  # blocks are also format-checked.
  # -----------------------------------------------------------------------
  fmt:
    name: rustfmt (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # -----------------------------------------------------------------------
  # Clippy — lints with warnings-as-errors, cross-platform.
  # Needed on Windows in particular so the `winapi` FFI module and any
  # `#[cfg(windows)]` code actually get linted.
  # -----------------------------------------------------------------------
  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies (arboard / X11)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  # -----------------------------------------------------------------------
  # Tests — the full workspace test suite on every supported OS.  Hash
  # and chain code is deterministic by design, so any cross-platform
  # drift (crypto, merkle, signing, canonical encoding) shows up here.
  # -----------------------------------------------------------------------
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (arboard / X11)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --workspace --locked
