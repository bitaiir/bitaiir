name: Release

# Fires when a tag of the form `v*` is pushed (e.g. `v0.1.0`,
# `v0.2.0-beta.1`).  Tags containing a `-` are treated as
# pre-releases on the GitHub side; everything else ships as stable.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write    # upload assets to the GitHub Release
  packages: write    # push images to ghcr.io

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ---------------------------------------------------------------------------
  # Cross-platform binaries.  Each matrix entry builds `bitaiird` +
  # `bitaiir-cli`, strips them, tars/zips the pair, and uploads the
  # archive as a workflow artifact.  The `release` job below collects
  # every artifact and attaches them to the GitHub Release.
  # ---------------------------------------------------------------------------
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64-linux — native on the runner, uses the host's
          # libxcb-*-dev packages installed below.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            use_cross: false
          # arm64 and RISC-V cross-compile via `cross`; their
          # xcb headers are installed inside the build image by the
          # `pre-build` commands in `Cross.toml`.
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            use_cross: true
          - target: riscv64gc-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Native x86_64-linux build needs libxcb-*-dev on the host
      # (`arboard` clipboard crate linked by the TUI).
      - name: Install xcb dev headers (native linux)
        if: runner.os == 'Linux' && matrix.use_cross == false
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked --version 0.2.5

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries
        shell: bash
        run: |
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --locked --target ${{ matrix.target }} --bin bitaiird --bin bitaiir-cli
          else
            cargo build --release --locked --target ${{ matrix.target }} --bin bitaiird --bin bitaiir-cli
          fi

      - name: Stage archive
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          stage="bitaiir-${version}-${{ matrix.target }}"
          mkdir -p "$stage"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/bitaiird.exe" "$stage/"
            cp "target/${{ matrix.target }}/release/bitaiir-cli.exe" "$stage/"
          else
            cp "target/${{ matrix.target }}/release/bitaiird" "$stage/"
            cp "target/${{ matrix.target }}/release/bitaiir-cli" "$stage/"
          fi
          cp README.md LICENSE "$stage/" 2>/dev/null || true
          echo "STAGE=$stage" >> "$GITHUB_ENV"

      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Create archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path $env:STAGE -DestinationPath "$env:STAGE.zip"
          (Get-FileHash -Algorithm SHA256 "$env:STAGE.zip").Hash.ToLower() + "  $env:STAGE.zip" `
            | Out-File -Encoding ascii "$env:STAGE.zip.sha256"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: bitaiir-${{ matrix.target }}
          path: |
            ${{ env.STAGE }}.${{ matrix.archive }}
            ${{ env.STAGE }}.${{ matrix.archive }}.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Docker image — multi-arch (linux/amd64 + linux/arm64), pushed to
  # GitHub Container Registry.  Two tags per release:
  #   * the exact version (immutable — pull this for reproducibility)
  #   * `latest` (mutable — resolves to whatever was most recently
  #     pushed; omitted for pre-release tags so a beta never shadows a
  #     stable release).
  # ---------------------------------------------------------------------------
  docker:
    name: docker (ghcr.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "VERSION=$version" >> "$GITHUB_OUTPUT"
          tags="ghcr.io/${GITHUB_REPOSITORY,,}:${version}"
          if [[ "$version" != *-* ]]; then
            tags="${tags},ghcr.io/${GITHUB_REPOSITORY,,}:latest"
          fi
          echo "TAGS=$tags" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.TAGS }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.tags.outputs.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ---------------------------------------------------------------------------
  # GitHub Release — collects every archive from the `build` matrix
  # and attaches them to a release keyed off the pushed tag.  A
  # pre-release marker (anything with a `-` in the tag, e.g.
  # `v0.2.0-beta.1`) is flagged as such on the release page.
  # ---------------------------------------------------------------------------
  release:
    name: github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten archive tree
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) \
            -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Detect pre-release
        id: meta
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
