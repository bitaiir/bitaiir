name: Bug report
description: Something in BitAiir isn't working the way it should.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug!

        **Security issues**: do **not** use this template.  Follow
        [SECURITY.md](../../blob/master/SECURITY.md) to report
        vulnerabilities privately.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: |
        The exact commands / clicks needed to trigger the bug, starting
        from a clean state if possible.
      placeholder: |
        1. Start the daemon with `bitaiird --testnet -i --mine`
        2. In another terminal, run `bitaiir-cli ...`
        3. See error "..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include any error message or log excerpt verbatim.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: BitAiir version
      description: Output of `bitaiird --version` or the commit hash you built.
      placeholder: "e.g. 0.1.0 (d7a3b31)"
    validations:
      required: true

  - type: dropdown
    id: network
    attributes:
      label: Network
      options:
        - mainnet
        - testnet
        - both
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system and architecture
      placeholder: "e.g. Windows 11 x86_64, Ubuntu 24.04 aarch64, macOS 14.4"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Paste any log excerpt that helps.  Trim aggressively — we don't
        need the last 10 000 lines, just the relevant bit.
      render: text
